services:
  traefik:
    image: traefik:v3
    ports:
      - "3000:3000"
      # - "8080:8080" # Traefik dashboard → http://localhost:8080
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  app:
    image: node:24
    user: "1001:1001"
    working_dir: /workspace/packages/app
    command: npm run dev
    volumes:
      - .:/workspace
    env_file: ./packages/app/.env.local
    environment:
      WORKER_SLUG: "${WORKER_SLUG}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.routers.app.rule=PathPrefix(`/`)"
      - "traefik.http.routers.app.priority=1"
      - "traefik.http.services.app.loadbalancer.server.port=3000"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: node:24
    user: "1001:1001"
    working_dir: /workspace/packages/api
    command: npm run dev
    volumes:
      - .:/workspace
    env_file: ./packages/api/.env.local
    environment:
      WORKER_SLUG: "${WORKER_SLUG}"
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.api.middlewares=api-strip"
      - "traefik.http.services.api.loadbalancer.server.port=3000"

  dbgate:
    image: dbgate/dbgate
    ports:
      - "1212:3000"
    environment:
      CONNECTIONS: postgres
      LABEL_postgres: PostgreSQL
      ENGINE_postgres: postgres@dbgate-plugin-postgres
      SERVER_postgres: postgres
      PORT_postgres: 5432
      USER_postgres: postgres
      PASSWORD_postgres: postgres
      DATABASE_postgres: app
    depends_on:
      - postgres

volumes:
  postgres_data:
