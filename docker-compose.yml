services:
  traefik:
    image: traefik:v3
    ports:
      - "3000:3000"
      # - "8080:8080" # Traefik dashboard → http://localhost:8080
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  app:
    image: node:24
    working_dir: /workspace/packages/app
    command: npm run dev
    volumes:
      - .:/workspace
    env_file: ./packages/app/.env.local
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.routers.app.rule=PathPrefix(`/`)"
      - "traefik.http.routers.app.priority=1"
      - "traefik.http.services.app.loadbalancer.server.port=3000"

  api:
    image: node:24
    working_dir: /workspace
    command: npm run dev -w packages/api
    volumes:
      - .:/workspace
    env_file: ./packages/api/.env.local
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.api.middlewares=api-strip"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
